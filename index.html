<!DOCTYPE html>
<html lang="en">
<head>
<script>
// Redirect ?admin to the app
if (window.location.search.includes('admin')) {
  window.location.replace('./bookings.html' + window.location.search);
}
// Persist affiliate ?ref= handle to localStorage so signup flow can pick it up
(function() {
  var ref = new URLSearchParams(window.location.search).get('ref');
  if (ref && /^[a-z0-9-]+$/i.test(ref)) localStorage.setItem('opdesk_ref', ref);
})();
</script>
