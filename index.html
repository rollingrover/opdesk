<!DOCTYPE html>
<html lang="en">
<head>
<script>
// Redirect ?admin to the app
if (window.location.search.includes('admin')) {
  window.location.replace('./bookings.html' + window.location.search);
}
// Persist affiliate ?ref= handle to localStorage so signup flow can pick it up
(function() {
  var ref = new URLSearchParams(window.location.search).get('ref');
  if (ref && /^[a-z0-9-]+$/i.test(ref)) localStorage.setItem('opdesk_ref', ref);
})();
</script>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>OpDesk — Operator's Command Centre</title>
  <meta name="description" content="The all-in-one booking, scheduling, and fleet management platform built for tour operators, safari companies, charters, and shuttle services worldwide."/>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='50' r='45' stroke='%23D4A853' stroke-width='3' fill='%230F2540'/><polygon points='50,15 55,45 50,50 45,45' fill='%23D4A853'/><polygon points='50,85 55,55 50,50 45,55' fill='%23D4A853' opacity='0.6'/><polygon points='15,50 45,45 50,50 45,55' fill='%23D4A853' opacity='0.6'/><polygon points='85,50 55,55 50,50 55,45' fill='%23D4A853'/></svg>"/>
  <style>
    :root {
      --navy:  #0F2540;
      --gold:  #D4A853;
      --light: #F8F9FB;
      --text:  #1a2744;
      --muted: #6b7280;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body { font-family: system-ui, -apple-system, 'Segoe UI', sans-serif; background: #fff; color: var(--text); line-height: 1.6; }

    /* ── NAV ── */
    nav {
      position: sticky; top: 0; z-index: 100;
      background: rgba(15,37,64,0.97); backdrop-filter: blur(8px);
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 5%; border-bottom: 1px solid rgba(255,255,255,0.08);
    }
    .nav-brand { display: flex; align-items: center; gap: 10px; text-decoration: none; }
    .nav-brand svg { flex-shrink: 0; }
    .nav-brand-name { font-size: 20px; font-weight: 900; color: #fff; letter-spacing: -0.3px; }
    .nav-brand-tag  { font-size: 10px; color: var(--gold); font-weight: 600; letter-spacing: 0.8px; text-transform: uppercase; margin-top: -2px; }
    .nav-links { display: flex; align-items: center; gap: 28px; }
    .nav-links a { color: rgba(255,255,255,0.75); text-decoration: none; font-size: 14px; font-weight: 500; transition: color 0.2s; }
    .nav-links a:hover { color: #fff; }
    .nav-cta { background: var(--gold); color: var(--navy) !important; font-weight: 700 !important; padding: 8px 20px; border-radius: 20px; }
    .nav-cta:hover { background: #e0b55a !important; }

    /* ── HERO ── */
    .hero {
      background: linear-gradient(135deg, var(--navy) 0%, #162e50 60%, #1a3a60 100%);
      padding: 90px 5% 80px; text-align: center; overflow: hidden; position: relative;
    }
    .hero::before {
      content: '';
      position: absolute; inset: 0;
      pointer-events: none;
      background: radial-gradient(ellipse 80% 60% at 50% 110%, rgba(212,168,83,0.15) 0%, transparent 60%);
    }
    .hero-badge {
      display: inline-block; background: rgba(212,168,83,0.18); color: var(--gold);
      font-size: 12px; font-weight: 700; letter-spacing: 1.2px; text-transform: uppercase;
      padding: 6px 16px; border-radius: 20px; border: 1px solid rgba(212,168,83,0.3);
      margin-bottom: 24px;
    }
    .hero h1 {
      font-size: clamp(32px, 5vw, 58px); font-weight: 900; color: #fff;
      line-height: 1.15; letter-spacing: -1px; max-width: 800px; margin: 0 auto 20px;
    }
    .hero h1 span { color: var(--gold); }
    .hero-sub {
      font-size: clamp(15px, 2vw, 19px); color: rgba(255,255,255,0.72);
      max-width: 580px; margin: 0 auto 36px; line-height: 1.65;
    }
    .hero-actions { display: flex; gap: 14px; justify-content: center; flex-wrap: wrap; }
    .btn-gold {
      background: var(--gold); color: var(--navy); font-weight: 800;
      padding: 14px 32px; border-radius: 28px; text-decoration: none;
      font-size: 16px; border: none; cursor: pointer; transition: all 0.2s;
      display: inline-flex; align-items: center; gap: 8px;
    }
    .btn-gold:hover { background: #e0b55a; transform: translateY(-1px); box-shadow: 0 8px 24px rgba(212,168,83,0.35); }
    .btn-outline {
      background: transparent; color: #fff; font-weight: 700;
      padding: 14px 32px; border-radius: 28px; text-decoration: none;
      font-size: 16px; border: 2px solid rgba(255,255,255,0.3); transition: all 0.2s;
      display: inline-flex; align-items: center; gap: 8px;
    }
    .btn-outline:hover { border-color: #fff; background: rgba(255,255,255,0.08); }
    .hero-proof {
      margin-top: 48px; display: flex; justify-content: center; gap: 40px; flex-wrap: wrap;
    }
    .hero-proof-item { text-align: center; }
    .hero-proof-num { font-size: 28px; font-weight: 900; color: var(--gold); }
    .hero-proof-label { font-size: 12px; color: rgba(255,255,255,0.5); text-transform: uppercase; letter-spacing: 0.6px; }

    /* ── SECTION BASICS ── */
    section { padding: 80px 5%; }
    .section-tag { font-size: 12px; font-weight: 700; letter-spacing: 1.4px; text-transform: uppercase; color: var(--gold); margin-bottom: 12px; }
    .section-title { font-size: clamp(26px, 3.5vw, 38px); font-weight: 900; color: var(--navy); line-height: 1.2; margin-bottom: 14px; }
    .section-sub { font-size: 16px; color: var(--muted); max-width: 520px; line-height: 1.7; }
    .centered { text-align: center; }
    .centered .section-sub { margin: 0 auto; }

    /* ── LOGOS / TRUST BAR ── */
    .trust-bar { background: var(--light); padding: 24px 5%; text-align: center; }
    .trust-bar p { font-size: 13px; color: var(--muted); letter-spacing: 0.5px; margin-bottom: 16px; text-transform: uppercase; font-weight: 600; }
    .trust-tags { display: flex; justify-content: center; gap: 12px; flex-wrap: wrap; }
    .trust-tag { background: #fff; border: 1px solid #e5e7eb; color: var(--navy); font-size: 13px; font-weight: 600; padding: 7px 18px; border-radius: 20px; }

    /* ── FEATURES ── */
    .features { background: var(--light); }
    .features-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 24px; margin-top: 48px; }
    .feature-card {
      background: #fff; border-radius: 16px; padding: 28px;
      border: 1px solid #e9ecef; transition: all 0.2s;
    }
    .feature-card:hover { transform: translateY(-3px); box-shadow: 0 12px 32px rgba(15,37,64,0.1); border-color: var(--gold); }
    .feature-icon { width: 48px; height: 48px; border-radius: 12px; background: rgba(15,37,64,0.06); display: flex; align-items: center; justify-content: center; margin-bottom: 16px; font-size: 22px; }
    .feature-title { font-size: 17px; font-weight: 800; color: var(--navy); margin-bottom: 8px; }
    .feature-desc { font-size: 14px; color: var(--muted); line-height: 1.65; }

    /* ── INDUSTRIES ── */
    .industries-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin-top: 48px; }
    .industry-card {
      border-radius: 14px; padding: 28px 20px; text-align: center;
      background: linear-gradient(135deg, var(--navy) 0%, #1c3a60 100%);
      color: #fff; border: 1px solid rgba(212,168,83,0.2);
    }
    .industry-emoji { font-size: 32px; margin-bottom: 10px; }
    .industry-name { font-size: 15px; font-weight: 800; color: #fff; margin-bottom: 4px; }
    .industry-sub { font-size: 12px; color: rgba(255,255,255,0.55); }

    /* ── PRICING ── */
    .pricing { background: var(--light); }
    .pricing-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 20px; margin-top: 48px; max-width: 980px; margin-left: auto; margin-right: auto; }
    .pricing-card {
      background: #fff; border-radius: 20px; padding: 30px 24px;
      border: 2px solid #e9ecef; position: relative; transition: all 0.2s;
    }
    .pricing-card.featured {
      border-color: var(--gold); background: var(--navy); color: #fff;
      transform: scale(1.03);
    }
    .pricing-card:hover { box-shadow: 0 16px 40px rgba(15,37,64,0.12); }
    .tier-name { font-size: 13px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; color: var(--muted); margin-bottom: 10px; }
    .featured .tier-name { color: var(--gold); }
    .tier-price { font-size: 36px; font-weight: 900; color: var(--navy); line-height: 1; }
    .featured .tier-price { color: #fff; }
    .tier-price-sub { font-size: 13px; color: var(--muted); margin: 4px 0 20px; }
    .featured .tier-price-sub { color: rgba(255,255,255,0.6); }
    .tier-features { list-style: none; space-y: 8px; margin-bottom: 24px; }
    .tier-features li { font-size: 13px; color: #374151; padding: 5px 0; display: flex; align-items: center; gap: 8px; }
    .featured .tier-features li { color: rgba(255,255,255,0.85); }
    .tier-features li::before { content: "✓"; color: var(--gold); font-weight: 900; flex-shrink: 0; }
    .tier-badge { position: absolute; top: -12px; left: 50%; transform: translateX(-50%); background: var(--gold); color: var(--navy); font-size: 11px; font-weight: 800; padding: 4px 14px; border-radius: 20px; white-space: nowrap; }
    .btn-plan { display: block; text-align: center; padding: 12px; border-radius: 12px; font-weight: 700; font-size: 14px; text-decoration: none; transition: all 0.2s; }
    .btn-plan-gold { background: var(--gold); color: var(--navy); }
    .btn-plan-gold:hover { background: #e0b55a; }
    .btn-plan-navy { background: rgba(255,255,255,0.12); color: #fff; border: 1px solid rgba(255,255,255,0.3); }
    .btn-plan-navy:hover { background: rgba(255,255,255,0.22); }
    .btn-plan-outline { background: #fff; color: var(--navy); border: 2px solid #e5e7eb; }
    .btn-plan-outline:hover { border-color: var(--navy); }
    .pricing-note { text-align: center; margin-top: 24px; font-size: 13px; color: var(--muted); }

    /* ── CTA ── */
    .cta-section {
      background: linear-gradient(135deg, var(--navy) 0%, #162e50 100%);
      text-align: center; padding: 80px 5%;
    }
    .cta-section h2 { font-size: clamp(26px, 4vw, 42px); font-weight: 900; color: #fff; margin-bottom: 16px; }
    .cta-section p { font-size: 17px; color: rgba(255,255,255,0.65); margin-bottom: 36px; max-width: 520px; margin-left: auto; margin-right: auto; }

    /* ── DIFFERENTIATORS ── */
    .diff-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 20px; margin-top: 48px; }
    .diff-item { display: flex; gap: 16px; align-items: flex-start; }
    .diff-dot { width: 10px; height: 10px; border-radius: 50%; background: var(--gold); margin-top: 6px; flex-shrink: 0; }
    .diff-text h4 { font-size: 16px; font-weight: 800; color: var(--navy); margin-bottom: 4px; }
    .diff-text p  { font-size: 14px; color: var(--muted); line-height: 1.6; }

    /* ── FOOTER ── */
    footer {
      background: var(--navy); color: rgba(255,255,255,0.5);
      padding: 40px 5%; text-align: center; font-size: 13px;
    }
    footer a { color: var(--gold); text-decoration: none; }
    .footer-brand { font-size: 20px; font-weight: 900; color: #fff; margin-bottom: 8px; }

    /* ── MOBILE ── */
    @media (max-width: 640px) {
      nav { padding: 12px 4%; }
      .nav-links { display: none; }
      section { padding: 60px 4%; }
      .hero { padding: 70px 4% 60px; }
      .hero-proof { gap: 24px; }
    }
  </style>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.0/dist/umd/supabase.min.js"></script>
</head>
